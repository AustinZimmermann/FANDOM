<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゾーダ | F-ZERO Wiki | Fandom</title>
    <style>
      body {
    background-color: #2c3e50;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

/* Safari Window Frame */
.safari-container {
    width: 900px;
    height: 600px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.safari-header {
    background: linear-gradient(to bottom, #ebebeb, #d5d5d5);
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid #b5b5b5;
}

.traffic-lights span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
}
.red { background: #ff5f56; border: 0.5px solid #e0443e; }
.yellow { background: #ffbd2e; border: 0.5px solid #dea123; }
.green { background: #27c93f; border: 0.5px solid #1aab29; }

.address-bar {
    background: white;
    margin-left: 100px;
    width: 500px;
    height: 24px;
    border-radius: 5px;
    font-size: 12px;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #ccc;
}

/* Fandom Content */
.wiki-viewport {
    flex-grow: 1;
    overflow-y: auto;
}

.fandom-nav {
    background-color: #002a32;
    color: white;
    height: 45px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    justify-content: space-between;
}

.wiki-page {
    padding: 20px;
    color: #333;
}

.content-wrapper {
    display: flex;
    gap: 20px;
}

.main-text { flex: 2; }

/* Infobox Styling */
.infobox {
    flex: 1;
    background: #f8f9fa;
    border: 1px solid #a2a9b1;
    padding: 10px;
    max-width: 300px;
}

.infobox-title {
    background: #00d6d6;
    color: #000;
    text-align: center;
    font-size: 1.2em;
    margin-top: 0;
    padding: 5px;
}

.infobox-image img {
    width: 100%;
    height: auto;
    border: 1px solid #ccc;
}

.data-row {
    display: flex;
    border-bottom: 1px solid #ddd;
    padding: 5px 0;
    font-size: 0.9em;
}

.label { font-weight: bold; width: 100px; }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "ゾーダ",
      "description": "『F-ZERO』シリーズのキャラクター、ゾーダについてのWikiページ",
      "publisher": {
        "@type": "Organization",
        "name": "Fandom"
      }
    }
    </script>
</head>
<body>

<div class="safari-container">
    <div class="safari-header">
        <div class="traffic-lights">
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="green"></span>
        </div>
        <div class="address-bar">
            <span class="lock-icon">🔒</span>
            fzero.fandom.com/ja/wiki/ゾーダ
        </div>
    </div>

    <div class="wiki-viewport">
        <nav class="fandom-nav">
            <div class="logo">FANDOM</div>
            <div class="search-box">Wiki内を検索</div>
        </nav>

        <main class="wiki-page">
            <header class="page-header">
                <h1>ゾーダ (Zoda)</h1>
                <hr>
            </header>

            <div class="content-wrapper">
                <article class="main-text">
                    <p><strong>ゾーダ</strong>（<span lang="en">Zoda</span>）は、『F-ZERO』シリーズに登場するキャラクター。悪の組織の首領であり、キャプテン ファルコンの宿敵の一人。</p>
                    <h2>概要</h2>
                    <p>謎の変身スーツに身を包んだ怪人。地球征服を企んでおり、その資金稼ぎのためにF-ZEROグランプリに参戦している。</p>
                </article>

                <aside class="infobox">
                    <h2 class="infobox-title">ゾーダ</h2>
                    <figure class="infobox-image">
                        <img src="https://static.wikia.nocookie.net/fzero/images/1/1f/057.jpg" alt="Zoda">
                        <figcaption>『F-ZERO GX』のゾーダ</figcaption>
                    </figure>
                    <section class="infobox-data">
                        <div class="data-row">
                            <div class="label">性別</div>
                            <div class="value">男</div>
                        </div>
                        <div class="data-row">
                            <div class="label">搭乗マシン</div>
                            <div class="value">デスアンカー（DEATH ANCHOR）</div>
                        </div>
                        <div class="data-row">
                            <div class="label">初登場作品</div>
                            <div class="value">F-ZERO X (N64)</div>
                        </div>
                    </section>
                </aside>
            </div>
        </main>
    </div>
</div>

<script>
  // Simulate "Loading" effect when opening the page
document.addEventListener("DOMContentLoaded", () => {
    console.log("F-ZERO Wiki: Zoda page loaded in Safari simulator.");
    
    const addressBar = document.querySelector('.address-bar');
    addressBar.addEventListener('click', () => {
        alert("This is a simulated Safari address bar.");
    });
});
</script>
</body>
</html>
